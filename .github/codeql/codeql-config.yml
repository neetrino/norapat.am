# CodeQL — custom config (use with Advanced setup: workflow init + config-file).
# Default setup in repo Settings does not load this file; use `.github/workflows/codeql.yml` or switch to Advanced setup.
#
# Idram Merchant API requires MD5 for EDP_CHECKSUM only (see Idram Merchant API New.md in payment integration docs).
# SHA-2 is not accepted by the gateway. We exclude only the checksum helper from analysis so the rest of the repo
# still runs js/weak-cryptographic-algorithm everywhere else.
name: norapat-codeql
paths-ignore:
  - src/lib/payments/idram/idram.checksum.ts
