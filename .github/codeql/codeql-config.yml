# CodeQL config — օգտագործվում է `.github/workflows/codeql.yml` (init + config-file)։
# GitHub Default setup-ը պետք է անջատված լինի, թե չէ advanced SARIF-ը չի ընդունվի։
# Settings → Code security → Code scanning → CodeQL → Default setup (off)։
#
# CodeQL. Idram Merchant API-ում EDP_CHECKSUM-ը միայն MD5 է (SHA-2-ով չի փոխարինվում)։
# Ռեպոյում այլ createHash('md5') չկա — այս հարցման բացառումը անվտանգ է։
name: norapat-codeql
query-filters:
  - exclude:
      id: js/weak-cryptographic-algorithm
